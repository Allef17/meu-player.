<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVPlay</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

:root{
  --plyr-color-main:#e50914;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  position:relative;
}

/* TOPO */
.top-bar{
  position:absolute;
  top:0;
  right:0;
  width:100%;
  padding:20px;
  z-index:20;

  background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);

  display:flex;
  justify-content:flex-end;
  align-items:center;
}

.logo{
  color:#e50914;
  font-size:24px;
  font-weight:bold;
  letter-spacing:1px;
}

/* PLAYER */
.player-container{
  width:100%;
  height:100vh;
  background:#000;
}

video{
  width:100%;
  height:100%;
}

/* PLYR */
.plyr{
  height:100%;
  color:white;
}

.plyr--video{
  background:#000;
}

.plyr--full-ui input[type=range]{
  color:#e50914;
}

/* CONTROLES */
.plyr__controls{
  background:linear-gradient(to top, rgba(0,0,0,.95), rgba(0,0,0,.4), transparent) !important;
  padding:20px !important;
}

.plyr__control--overlaid{
  background:rgba(229,9,20,.95);
  padding:22px;
}

/* UI OCULTA */
.hide-ui .top-bar,
.hide-ui .plyr__controls{
  opacity:0;
  pointer-events:none;
}

/* MOBILE */
@media(max-width:768px){
  .logo{
    font-size:18px;
  }
}

</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">TVPlay</div>
</div>

<div class="player-container">

  <video id="player" playsinline controls></video>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

// PEGAR URL DO FILME
const params = new URLSearchParams(window.location.search);
const videoUrl = params.get("url");

// INICIAR PLAYER
const player = new Plyr('#player', {
  seekTime: 10,
  controls: [
    'play-large',
    'rewind',
    'play',
    'fast-forward',
    'progress',
    'current-time',
    'duration',
    'mute',
    'volume',
    'settings',
    'fullscreen'
  ],
  settings: ['speed']
});

// DEFINIR VÍDEO DINAMICAMENTE
if (videoUrl) {
  const video = document.getElementById("player");
  video.src = videoUrl;
  video.load();
}

// UI AUTO HIDE
const body = document.body;
let hideTimeout;

function showUI(){
  body.classList.remove('hide-ui');

  clearTimeout(hideTimeout);

  hideTimeout = setTimeout(()=>{
    if(player.playing){
      body.classList.add('hide-ui');
    }
  },3000);
}

document.addEventListener('mousemove',showUI);
document.addEventListener('touchstart',showUI);
document.addEventListener('click',showUI);

player.on('play',showUI);

player.on('pause',()=>{
  body.classList.remove('hide-ui');
});

showUI();

</script>

</body>
</html>
