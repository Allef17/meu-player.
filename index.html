<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVPlay</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

html,body{
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
}

.player-container{
  position:relative;
  width:100%;
  height:100vh;
  background:black;
}

/* VIDEO */

video{
  width:100%;
  height:100%;
  object-fit:cover;
  background:black;
}

/* OVERLAY */

.overlay{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0.8),
    transparent 20%,
    transparent 80%,
    rgba(0,0,0,0.9)
  );
  z-index:10;
  pointer-events:none;
}

/* TOPO */

.top-bar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:25px;
  color:white;
}

.top-left,
.top-right{
  display:flex;
  align-items:center;
  gap:20px;
}

.icon-btn{
  font-size:34px;
  color:#ff0000;
}

.title{
  font-size:22px;
  font-weight:bold;
}

.logo{
  font-size:26px;
  font-weight:bold;
  color:#ff0000;
}

/* CENTRO */

.center-controls{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%, -50%);
  display:flex;
  align-items:center;
  gap:120px;
  pointer-events:auto;
}

.control-btn{
  width:90px;
  height:90px;
  border-radius:50%;
  border:3px solid #ff0000;
  display:flex;
  justify-content:center;
  align-items:center;
  color:#ff0000;
  font-size:36px;
  background:rgba(0,0,0,0.4);
  cursor:pointer;
  transition:.2s;
}

.control-btn:hover{
  transform:scale(1.1);
  background:#ff0000;
  color:white;
}

.play-btn{
  width:110px;
  height:110px;
  background:#ff0000;
  color:white;
  border:none;
  font-size:50px;
}

.play-btn:hover{
  background:#cc0000;
}

/* BARRA */

.progress-container{
  width:100%;
  padding:0 30px;
  margin-bottom:35px;
  pointer-events:auto;
}

.progress-info{
  display:flex;
  align-items:center;
  gap:15px;
}

.progress{
  flex:1;
  appearance:none;
  height:5px;
  border-radius:10px;
  background:#555;
  outline:none;
}

.progress::-webkit-slider-thumb{
  appearance:none;
  width:22px;
  height:22px;
  border-radius:50%;
  background:#ff0000;
  cursor:pointer;
}

.time{
  color:white;
  font-size:20px;
  min-width:70px;
  text-align:right;
}

/* MENU INFERIOR */

.bottom-menu{
  display:flex;
  justify-content:space-around;
  align-items:center;
  margin-top:25px;
  color:#ff0000;
}

.menu-item{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:22px;
  cursor:pointer;
}

.menu-item i{
  font-size:30px;
}

/* RESPONSIVO */

@media(max-width:768px){

  .title{
    font-size:16px;
  }

  .logo{
    font-size:20px;
  }

  .center-controls{
    gap:50px;
  }

  .control-btn{
    width:65px;
    height:65px;
    font-size:25px;
  }

  .play-btn{
    width:80px;
    height:80px;
    font-size:35px;
  }

  .menu-item{
    font-size:14px;
  }

  .menu-item i{
    font-size:20px;
  }

}

</style>
</head>

<body>

<div class="player-container">

<video id="video">
  <source src="https://www-fontedecanais-me.58ioec50wtok71.com/movies/23/199756.mp4?username=wowserver-vods&token=C1EQAgcOWlBaW0dLUlheU0tSR04FAAEZBAoVD0lWUgQLHBkOChwOHl0FCw8ZSVRIBg0ILAcEBAUdCR8FHx0XSVBJS1pbTlxRBgoEDw8DDxgYUV5ZWUVJXUdOExwKHw8FDDUCCFJJUl9SXk9YFg%3D%3D" type="video/mp4">
</video>

<div class="overlay">

<!-- TOPO -->

<div class="top-bar">

<div class="top-left">
<i class="fa-solid fa-arrow-left icon-btn"></i>
</div>

<div class="title">
TVPlay
</div>

<div class="top-right">
<i class="fa-solid fa-tv icon-btn"></i>
<div class="logo">TVPlay</div>
</div>

</div>

<!-- CONTROLES -->

<div class="center-controls">

<div class="control-btn" id="rewind">
<i class="fa-solid fa-rotate-left"></i>
</div>

<div class="control-btn play-btn" id="playPause">
<i class="fa-solid fa-play"></i>
</div>

<div class="control-btn" id="forward">
<i class="fa-solid fa-rotate-right"></i>
</div>

</div>

<!-- BOTTOM -->

<div class="progress-container">

<div class="progress-info">
<input type="range" class="progress" id="progress" value="0">
<div class="time" id="time">00:00</div>
</div>

<div class="bottom-menu">

<div class="menu-item">
<i class="fa-solid fa-lock"></i>
<span>Bloqueio</span>
</div>

<div class="menu-item">
<i class="fa-solid fa-clone"></i>
<span>Episódios</span>
</div>

<div class="menu-item">
<i class="fa-solid fa-closed-captioning"></i>
<span>Legendas</span>
</div>

<div class="menu-item">
<i class="fa-solid fa-forward-step"></i>
<span>Próx.</span>
</div>

</div>

</div>

</div>

</div>

<script>

const video = document.getElementById('video');
const playPause = document.getElementById('playPause');
const progress = document.getElementById('progress');
const time = document.getElementById('time');

playPause.addEventListener('click', () => {

  if(video.paused){
    video.play();
    playPause.innerHTML = '<i class="fa-solid fa-pause"></i>';
  }else{
    video.pause();
    playPause.innerHTML = '<i class="fa-solid fa-play"></i>';
  }

});

document.getElementById('forward').addEventListener('click', () => {
  video.currentTime += 10;
});

document.getElementById('rewind').addEventListener('click', () => {
  video.currentTime -= 10;
});

video.addEventListener('timeupdate', () => {

  const percent = (video.currentTime / video.duration) * 100;
  progress.value = percent;

  let minutes = Math.floor(video.currentTime / 60);
  let seconds = Math.floor(video.currentTime % 60);

  if(seconds < 10){
    seconds = '0' + seconds;
  }

  time.innerText = minutes + ':' + seconds;

});

progress.addEventListener('input', () => {

  const seekTime = (progress.value / 100) * video.duration;
  video.currentTime = seekTime;

});

</script>

</body>
</html>
