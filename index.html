<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVPlay</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

:root{
  --plyr-color-main:#e50914;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  position:relative;
}

/* TOPO */

.top-bar{
  position:absolute;
  top:0;
  right:0;
  width:100%;
  padding:20px;
  z-index:20;

  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.9),
    transparent
  );

  display:flex;
  justify-content:flex-end;
  align-items:center;

  transition:.3s;
}

.logo{
  color:#e50914;
  font-size:24px;
  font-weight:bold;
  letter-spacing:1px;
}

/* PLAYER */

.player-container{
  width:100%;
  height:100vh;
  background:#000;
}

video{
  width:100%;
  height:100%;
}

/* PLYR */

.plyr{
  height:100%;
  color:white;
}

.plyr--video{
  background:#000;
}

.plyr--full-ui input[type=range]{
  color:#e50914;
}

/* PLAY CENTRAL */

.plyr__control--overlaid{
  background:rgba(229,9,20,.95);
  padding:22px;
}

.plyr__control--overlaid:hover{
  background:#ff1f1f !important;
}

/* BOTÕES */

.plyr__control:hover{
  background:#e50914 !important;
}

/* BARRA INFERIOR */

.plyr__controls{
  background:linear-gradient(
    to top,
    rgba(0,0,0,.95),
    rgba(0,0,0,.4),
    transparent
  ) !important;

  padding:20px !important;

  transition:.3s;
}

/* BUFFER */

.plyr__progress__buffer{
  color:rgba(255,255,255,.25);
}

/* ESCONDER UI */

.hide-ui .top-bar,
.hide-ui .plyr__controls{
  opacity:0;
  pointer-events:none;
}

/* MOBILE */

@media(max-width:768px){

  .logo{
    font-size:18px;
  }

  .plyr__controls{
    padding:10px !important;
  }

}

</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">TVPlay</div>
</div>

<div class="player-container">

  <video id="player" playsinline controls>
    <source src="https://www-fontedecanais-me.58ioec50wtok71.com/movies/22/291867.mp4?username=wowserver-vods&token=C1EQAgcOWlBaW0dLUlxSUk5aR04FAAEZBAoVD0lWUgQLHBkOChwOHl0FCw8ZSVRIBg0ILAcEBAUdCR8FHx0XSVBJS1pbTlxRBgoEDw8DDxgYUV5eRF1ARkkPHx0QDgQfJwMPTkpFUF5TXkkX" type="video/mp4"/>
  </video>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const player = new Plyr('#player',{

  seekTime:10,

  controls:[
    'play-large',
    'rewind',
    'play',
    'fast-forward',
    'progress',
    'current-time',
    'duration',
    'mute',
    'volume',
    'settings',
    'fullscreen'
  ],

  settings:[
    'speed'
  ],

  tooltips:{
    controls:true,
    seek:true
  }

});

const body = document.body;

let hideTimeout;

/* MOSTRAR UI */

function showUI(){

  body.classList.remove('hide-ui');

  clearTimeout(hideTimeout);

  hideTimeout = setTimeout(()=>{

    if(player.playing){
      body.classList.add('hide-ui');
    }

  },3000);

}

/* EVENTOS */

document.addEventListener('mousemove',showUI);
document.addEventListener('touchstart',showUI);
document.addEventListener('click',showUI);

player.on('play',showUI);
player.on('pause',()=>{

  body.classList.remove('hide-ui');

});

/* INICIAR */

showUI();

</script>

</body>
</html>
