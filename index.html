<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>TVPlay</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css"/>

<style>

:root{
  --plyr-color-main:#e50914;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html,body{
  width:100%;
  height:100%;
  background:#000;
  overflow:hidden;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  position:relative;
}

/* TOPO */

.top-bar{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  padding:20px;
  z-index:30;

  display:flex;
  justify-content:flex-end;
  align-items:center;

  background:linear-gradient(
    to bottom,
    rgba(0,0,0,.9),
    transparent
  );

  transition:opacity .3s ease;
}

.logo{
  color:#e50914;
  font-size:24px;
  font-weight:bold;
}

/* PLAYER */

.player-container{
  width:100%;
  height:100vh;
  background:#000;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.plyr{
  height:100%;
}

.plyr--video{
  background:#000;
  height:100%;
}

/* CONTROLES INFERIORES */

.plyr__controls{
  background:linear-gradient(
    to top,
    rgba(0,0,0,.95),
    rgba(0,0,0,.4),
    transparent
  ) !important;

  padding:20px !important;

  transition:opacity .3s ease;
}

.plyr__control{
  color:#fff !important;
}

.plyr__control:hover{
  background:#e50914 !important;
}

.plyr--full-ui input[type=range]{
  color:#e50914;
}

/* CONTROLES CENTRAIS */

.center-controls{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  z-index:40;

  display:flex;
  align-items:center;
  gap:90px;

  transition:opacity .3s ease;
}

/* BOTÕES 10s */

.circle-btn{
  width:90px;
  height:90px;
  border:none;
  background:transparent;
  color:white;
  cursor:pointer;

  display:flex;
  justify-content:center;
  align-items:center;

  transition:.2s;
}

.circle-btn:hover{
  transform:scale(1.08);
}

.icon-wrapper{
  position:relative;
  font-size:65px;
  line-height:1;
  color:white;
}

.icon-wrapper span{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:18px;
  font-weight:bold;
}

/* PLAY CENTRAL */

.play-circle-btn{
  width:110px;
  height:110px;

  border:none;
  background:transparent;

  color:white;
  font-size:95px;

  cursor:pointer;

  transition:.2s;
}

.play-circle-btn:hover{
  transform:scale(1.08);
  color:#e50914;
}

/* ESCONDER UI */

.hide-ui .center-controls,
.hide-ui .top-bar,
.hide-ui .plyr__controls{
  opacity:0;
  pointer-events:none;
}

/* MOBILE */

@media(max-width:768px){

  .center-controls{
    gap:45px;
  }

  .circle-btn{
    width:65px;
    height:65px;
  }

  .icon-wrapper{
    font-size:48px;
  }

  .icon-wrapper span{
    font-size:14px;
  }

  .play-circle-btn{
    font-size:70px;
  }

  .logo{
    font-size:18px;
  }

}

</style>
</head>

<body>

<div class="top-bar">
  <div class="logo">TVPlay</div>
</div>

<div class="player-container">

  <video id="player" playsinline>
    <source src="https://www-fontedecanais-me.58ioec50wtok71.com/movies/23/199756.mp4?username=wowserver-vods&token=C1EQAgcOWlBaW0dLUlheU0tSR04FAAEZBAoVD0lWUgQLHBkOChwOHl0FCw8ZSVRIBg0ILAcEBAUdCR8FHx0XSVBJS1pbTlxRBgoEDw8DDxgYUV5ZWUVJXUdOExwKHw8FDDUCCFJJUl9SXk9YFg%3D%3D" type="video/mp4"/>
  </video>

  <!-- CONTROLES CENTRAIS -->

  <div class="center-controls" id="centerControls">

    <!-- VOLTAR -->
    <button class="circle-btn" id="rewindBtn">
      <div class="icon-wrapper">
        ↺
        <span>10</span>
      </div>
    </button>

    <!-- PLAY -->
    <button class="play-circle-btn" id="playBtn">
      ▶
    </button>

    <!-- AVANÇAR -->
    <button class="circle-btn" id="forwardBtn">
      <div class="icon-wrapper">
        ↻
        <span>10</span>
      </div>
    </button>

  </div>

</div>

<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<script>

const player = new Plyr('#player',{

  controls:[
    'progress',
    'current-time',
    'duration',
    'mute',
    'volume',
    'settings',
    'fullscreen'
  ],

  settings:['speed'],

  tooltips:{
    controls:true,
    seek:true
  }

});

const body = document.body;

const playBtn = document.getElementById('playBtn');
const rewindBtn = document.getElementById('rewindBtn');
const forwardBtn = document.getElementById('forwardBtn');

let hideTimeout;

/* PLAY */

playBtn.addEventListener('click',()=>{

  if(player.playing){
    player.pause();
    playBtn.innerHTML = '▶';
  }else{
    player.play();
    playBtn.innerHTML = '❚❚';
  }

});

/* AVANÇAR */

forwardBtn.addEventListener('click',()=>{

  player.currentTime += 10;

});

/* VOLTAR */

rewindBtn.addEventListener('click',()=>{

  player.currentTime -= 10;

});

/* MOSTRAR UI */

function showUI(){

  body.classList.remove('hide-ui');

  clearTimeout(hideTimeout);

  hideTimeout = setTimeout(()=>{

    if(player.playing){
      body.classList.add('hide-ui');
    }

  },3000);

}

/* DETECTAR MOVIMENTO */

document.addEventListener('mousemove',showUI);
document.addEventListener('touchstart',showUI);
document.addEventListener('click',showUI);

/* INICIAR */

showUI();

/* EVENTOS PLAYER */

player.on('play',()=>{

  playBtn.innerHTML = '❚❚';
  showUI();

});

player.on('pause',()=>{

  playBtn.innerHTML = '▶';
  body.classList.remove('hide-ui');

});

</script>

</body>
</html>
